<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VR Media Viewer</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #000;
        overflow: hidden;
        font-family: system-ui, sans-serif;
      }
      canvas {
        display: block;
      }
      #vr-button {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        padding: 12px 24px;
        background: #4a9eff;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        z-index: 100;
      }
      #vr-button:hover {
        background: #3a8eef;
      }
      #vr-button:disabled {
        background: #666;
        cursor: not-allowed;
      }
      #file-picker {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
      }
      #file-input {
        display: none;
      }
      #pick-file {
        padding: 10px 20px;
        background: #333;
        color: white;
        border: 1px solid #555;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
      }
      #pick-file:hover {
        background: #444;
      }
      #current-file {
        margin-left: 12px;
        color: #888;
        font-size: 14px;
      }
      #info {
        position: fixed;
        bottom: 70px;
        left: 20px;
        color: #666;
        font-size: 12px;
        z-index: 100;
      }
    </style>
  </head>
  <body>
    <div id="file-picker">
      <input type="file" id="file-input" accept="image/*,video/*" multiple />
      <button id="pick-file">Select Photos/Videos</button>
      <span id="current-file"></span>
      <button id="toggle-gallery" style="margin-left: 12px; padding: 10px 16px; background: #555; color: white; border: 1px solid #666; border-radius: 6px; cursor: pointer;">Gallery</button>
    </div>
    <div id="info">Select media above, then enter VR</div>
    <button id="vr-button" disabled>VR Not Available</button>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
